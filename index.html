<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bánh Xe Phản Chiếu - Mobile Friendly</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f4f7f6; 
            padding: 10px; 
            margin: 0;
        }
        
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 100%;
            box-sizing: border-box;
        }

        /* Container chính */
        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
            flex-wrap: wrap; /* Cho phép rớt dòng trên điện thoại */
        }

        .wheel-container { 
            position: relative;
            /* Đảm bảo bánh xe không bị to quá màn hình điện thoại */
            max-width: 100%;
            overflow: visible;
            background: white; /* Đảm bảo nền trắng khi chụp */
        }

        /* SVG RESPONSIVE */
        #wheel {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Bảng hướng dẫn */
        .color-guide-right {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            min-width: 190px;
            text-align: left;
        }

        /* CSS CHO ĐIỆN THOẠI (Dưới 768px) */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column; /* Xếp chồng dọc */
                gap: 20px;
            }
            .color-guide-right {
                width: 80%; /* Bảng màu rộng hơn trên mobile */
                max-width: 300px;
            }
            h2 { font-size: 1.2rem; }
        }

        .guide-title { font-size: 13px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; color: #333; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; }
        .guide-row { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: bold; color: #444; position: relative; }
        
        .guide-color-box { 
            width: 25px; 
            height: 35px; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 16px; 
            font-weight: bold;
            flex-shrink: 0;
        }

        .segment { cursor: pointer; fill: #ffffff; transition: fill 0.2s; stroke: #eee; stroke-width: 0.5; stroke-dasharray: 2,2; }
        .section-border { fill: none; stroke-width: 1.5; pointer-events: none; }
        .label-text { font-size: 4.8px; font-weight: bold; fill: #ffffff; pointer-events: none; text-transform: uppercase; }
        .center-circle { fill: white; stroke: #444; stroke-width: 1.2; }
        .center-text { font-size: 4.5px; font-weight: bold; fill: #333; pointer-events: none; }

        .name-input-container {
            position: absolute; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -10%); /* Căn chỉnh chính xác hơn vào giữa vòng tròn */
            width: 80px;
            pointer-events: auto;
        }
        .name-input {
            width: 100%; border: none; border-bottom: 1px dotted #333;
            background: transparent; text-align: center; font-size: 10px;
            font-weight: bold; outline: none; color: #333;
        }

        /* THÊM STYLE CHO NÚT VÀ POPUP */
        .btn-confirm {
            margin-top: 25px; background: #2ecc71; color: white; border: none; 
            padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); font-size: 16px;
        }
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 15px; position: relative;
            max-width: 90%; text-align: center;
        }
        .close-popup { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #666; }
        #capturedImage { max-width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom:10px; font-weight:bolder;">BÁNH XE PHẢN CHIẾU</h2>
    
    <div class="main-content">
        <div class="wheel-container" id="wheelToCapture">
            <svg id="wheel" width="550" height="550" viewBox="-10 -10 220 220">
                <defs id="textPaths"></defs>
            </svg>
            <div class="name-input-container">
                <input type="text" id="studentName" class="name-input" placeholder="Nhập tên...">
            </div>
        </div>

        <div class="color-guide-right">
            <div class="guide-title">Hướng dẫn tô màu</div>
            <div class="guide-row">
                <div class="guide-color-box" style="background:#2ecc71">5</div> Rất hài lòng
            </div>
            <div class="guide-row">
                <div class="guide-color-box" style="background:#f1c40f">4</div> Hài lòng
            </div>
            <div class="guide-row">
                <div class="guide-color-box" style="background:#ffbd69">3</div> Bình thường
            </div>
            <div class="guide-row">
                <div class="guide-color-box" style="background:#e67e22">2</div> Ít hài lòng
            </div>
            <div class="guide-row">
                <div class="guide-color-box" style="background:#e74c3c">1</div> Không hài lòng
            </div>
        </div>
    </div>
    <button class="btn-confirm" onclick="captureWheel()">XÁC NHẬN KẾT QUẢ</button>
</div>

<div id="popupModal" class="modal">
    <div class="modal-content">
        <span class="close-popup" onclick="closePopup()">&times;</span>
        <h3 style="margin: 0;">Kết quả của bạn</h3>
        <p style="font-size: 12px; color: #666;">(Nhấn giữ ảnh để lưu về máy)</p>
        <div id="resultImage"></div>
    </div>
</div>

<script>
    const svg = document.getElementById('wheel');
    const defs = document.getElementById('textPaths');
    const categories = ["Mối quan hệ bạn bè", "Kết nối với gia đình", "Sở thích", "Sức khỏe và giấc ngủ", "Môi trường lớp học", "Cảm xúc mỗi ngày", "Sự tự tin của bản thân", "Học tập và điểm số"];
    const colorMap = { 1: "#e74c3c", 2: "#e67e22", 3: "#ffbd69", 4: "#f1c40f", 5: "#2ecc71" };
    const borderColors = ["#e3cb63", "#b5651d", "#006d77", "#0077b6", "#480ca8", "#594433", "#9b2226", "#9e7600"];
    
    let selectedLevels = Array(8).fill(0);
    const cx = 100, cy = 100, rMin = 28, rMaxTuning = 85, rOuterRing = 102;

    function describeArc(x, y, r, startA, endA, flip) {
        const rad = d => (d - 90) * Math.PI / 180;
        let sA = startA, eA = endA, sweep = 1;
        if (flip) { sA = endA; eA = startA; sweep = 0; }
        const start = { x: x + r * Math.cos(rad(sA)), y: y + r * Math.sin(rad(sA)) };
        const end = { x: x + r * Math.cos(rad(eA)), y: y + r * Math.sin(rad(eA)) };
        return `M ${start.x} ${start.y} A ${r} ${r} 0 0 ${sweep} ${end.x} ${end.y}`;
    }

    function getPath(x, y, rIn, rOut, startDeg, endDeg) {
        const rad = d => (d - 90) * Math.PI / 180;
        const p1 = { x: x + rOut * Math.cos(rad(endDeg)), y: y + rOut * Math.sin(rad(endDeg)) };
        const p2 = { x: x + rOut * Math.cos(rad(startDeg)), y: y + rOut * Math.sin(rad(startDeg)) };
        const p3 = { x: x + rIn * Math.cos(rad(startDeg)), y: y + rIn * Math.sin(rad(startDeg)) };
        const p4 = { x: x + rIn * Math.cos(rad(endDeg)), y: y + rIn * Math.sin(rad(endDeg)) };
        return `M ${p1.x} ${p1.y} A ${rOut} ${rOut} 0 0 0 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rIn} ${rIn} 0 0 1 ${p4.x} ${p4.y} Z`;
    }

    function drawCenter() {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", cx); circle.setAttribute("cy", cy); circle.setAttribute("r", rMin - 2);
        circle.setAttribute("class", "center-circle");
        const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t1.setAttribute("x", cx); t1.setAttribute("y", cy - 4);
        t1.setAttribute("text-anchor", "middle"); t1.setAttribute("class", "center-text");
        t1.textContent = "Bánh xe của:";
        g.appendChild(circle); g.appendChild(t1);
        svg.appendChild(g);
    }

    function colorize(sIdx, level, isPreview = false) {
        for (let l = 1; l <= 5; l++) {
            const el = document.getElementById(`s${sIdx}-l${l}`);
            if (el) {
                if (l <= level) {
                    el.style.fill = colorMap[l];
                    el.style.opacity = isPreview ? "0.6" : "1";
                } else el.style.fill = "#ffffff";
            }
        }
    }
    window.renderSlice = (sIdx) => colorize(sIdx, selectedLevels[sIdx], false);
    window.previewSlice = (sIdx, level) => colorize(sIdx, level, true);

    function init() {
        for (let s = 0; s < 8; s++) {
            const startA = s * 45 + 0.5;
            const endA = (s + 1) * 45 - 0.5;
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

            for (let l = 1; l <= 5; l++) {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const rIn = rMin + ((rMaxTuning - rMin) / 5) * (l - 1);
                const rOut = rMin + ((rMaxTuning - rMin) / 5) * l;
                path.setAttribute("d", getPath(cx, cy, rIn, rOut, startA, endA));
                path.setAttribute("class", "segment");
                path.setAttribute("id", `s${s}-l${l}`);
                path.onclick = () => { selectedLevels[s] = l; window.renderSlice(s); };
                path.onmouseenter = () => window.previewSlice(s, l);
                path.onmouseleave = () => window.renderSlice(s);
                g.appendChild(path);
            }

            const titleRing = document.createElementNS("http://www.w3.org/2000/svg", "path");
            titleRing.setAttribute("d", getPath(cx, cy, rMaxTuning, rOuterRing, startA, endA));
            titleRing.setAttribute("fill", borderColors[s]);
            g.appendChild(titleRing);

            const border = document.createElementNS("http://www.w3.org/2000/svg", "path");
            border.setAttribute("d", getPath(cx, cy, rMin, rOuterRing, startA, endA));
            border.setAttribute("class", "section-border");
            border.setAttribute("stroke", borderColors[s]);
            g.appendChild(border);

            svg.appendChild(g);
            
            const shouldFlip = (s >= 2 && s <= 5);
            const rText = shouldFlip ? (rMaxTuning + rOuterRing) / 2 + 3.2 : (rMaxTuning + rOuterRing) / 2 + 1.5; 
            
            const pathData = describeArc(cx, cy, rText, startA, endA, shouldFlip);
            const pathDef = document.createElementNS("http://www.w3.org/2000/svg", "path");
            pathDef.setAttribute("id", `path-s${s}`);
            pathDef.setAttribute("d", pathData);
            defs.appendChild(pathDef);

            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("class", "label-text");
            const txtPath = document.createElementNS("http://www.w3.org/2000/svg", "textPath");
            txtPath.setAttribute("href", `#path-s${s}`);
            txtPath.setAttribute("startOffset", "50%");
            txtPath.setAttribute("text-anchor", "middle");
            txtPath.textContent = categories[s];
            
            txt.appendChild(txtPath);
            svg.appendChild(txt);
        }
        drawCenter();
    }

    function captureWheel() {
        const nameInput = document.getElementById('studentName');
        const name = nameInput.value.trim();
        if (!name) {
            alert("Vui lòng nhập tên trước khi xác nhận!");
            return;
        }

        const area = document.getElementById('wheelToCapture');
        
        // Sử dụng html2canvas với các option tối ưu cho mobile
        html2canvas(area, {
            scale: 2,
            backgroundColor: "#ffffff",
            useCORS: true,
            logging: false,
            // Đảm bảo lấy đúng scroll
            scrollX: 0,
            scrollY: -window.scrollY
        }).then(canvas => {
            const img = new Image();
            img.src = canvas.toDataURL("image/png");
            img.id = "capturedImage";
            const resultDiv = document.getElementById('resultImage');
            resultDiv.innerHTML = '';
            resultDiv.appendChild(img);
            document.getElementById('popupModal').style.display = 'flex';
        });
    }

    function closePopup() {
        document.getElementById('popupModal').style.display = 'none';
    }

    init();
</script>
</body>
</html>
